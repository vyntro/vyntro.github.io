<!-- 3. FAQPage schema — drives Google rich result FAQ accordion in SERPs -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is Vyntro?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Vyntro is an AI-powered client onboarding and project scoping platform for agencies, freelancers, and software studios. It automates proposal generation, work breakdown structures, client portals, scope creep prevention, and billable hour tracking."
      }
    },
    {
      "@type": "Question",
      "name": "What is client onboarding?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Client onboarding is the systematic process of integrating a new client into your agency workflow — collecting requirements, generating a signed scope of work, provisioning a client portal, and aligning on milestones before work begins."
      }
    },
    {
      "@type": "Question",
      "name": "How do you automate client onboarding?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "You can automate client onboarding by connecting an AI intake questionnaire to an automated proposal generator and a client portal. Vyntro handles this end-to-end: the client fills in a brief, AI generates a scoped proposal, and upon approval the client portal is provisioned automatically."
      }
    },
    {
      "@type": "Question",
      "name": "What is an AI proposal generator?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "An AI proposal generator converts client requirements — from forms, transcripts, or briefs — into structured, professional project proposals including scope of work, milestone timelines, and cost estimates. Vyntro's AI proposal generator produces client-ready documents in seconds."
      }
    },
    {
      "@type": "Question",
      "name": "What is a Work Breakdown Structure (WBS)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A Work Breakdown Structure (WBS) is a hierarchical decomposition of a project into smaller, manageable work packages. It ensures no deliverable is missed, enables accurate time estimation, and provides clear task assignment for project teams. Vyntro generates WBS structures automatically using AI."
      }
    },
    {
      "@type": "Question",
      "name": "How does Vyntro prevent scope creep?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Vyntro locks the approved Statement of Work into a digital baseline at project start. Any mid-project additions are routed through a formal Change Request form that calculates cost and timeline impact before work begins, preventing unauthorized scope expansion."
      }
    },
    {
      "@type": "Question",
      "name": "What is a white-label client portal?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A white-label client portal is a branded project workspace hosted on your agency's custom domain. Clients log in to review milestones, approve deliverables, track progress, and communicate with your team — all under your agency's brand, not a third-party tool's branding."
      }
    },
    {
      "@type": "Question",
      "name": "What is proof of work software?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Proof of work software logs every work session linked to a specific task and milestone, generating verifiable reports that justify every invoice line item. Vyntro's immutable work log cannot be edited retroactively, making it dispute-proof evidence of completed work."
      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between a proposal and a statement of work?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A proposal is a sales document designed to persuade — it outlines intent and estimated costs. A statement of work (SOW) is a legal document designed to protect — it specifies exact deliverables, acceptance criteria, payment schedules, and change request procedures. In Vyntro, the proposal converts directly into an SOW upon client approval."
      }
    },
    {
      "@type": "Question",
      "name": "Which agencies can use Vyntro?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Vyntro is built for software agencies, web design studios, marketing agencies, freelancers, consultants, SaaS companies, creative agencies, and any service business that manages client projects. It ships with templates for software, web, marketing, enterprise IT, healthcare, legal, accounting, and 15+ other verticals."
      }
    }
  ]
}
</script>
